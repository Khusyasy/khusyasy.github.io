<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khusyasy</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="section-1" class="flex-center">
        <h1 data-aos="zoom-in" data-aos-delay="200">Hello, World!</h1>
        <div data-aos="zoom-in" data-aos-delay="400">
            <span id="typing-box" class="text-mono"></span>
        </div>
        <div id="typing-text" class="text-mono">
            <p>I am a <span class="text-bold">Student</span></p>
            <p>I am a <span class="text-bold">Programmer</span></p>
            <p>I am a <span class="text-bold">Website Developer</span></p>
            <p>I am a <span class="text-bold">Fullstack Developer</span></p>
        </div>
        <div id="scroll-down" class="flex-center" data-aos="fade-up" data-aos-delay="5000" data-aos-duration="1000">
            <p>Scroll Down</p>
            <div class="arrow"></div>
        </div>
    </div>
    <div id="section-2" class="flex-center">
        <div id="bits-2-1" class="flex-center">
            <img class="profile" src="./images/logo.jpg" alt="My Face" width="250px" height="250px" data-aos="zoom-in" >
        </div>
        <div id="bits-2-2">
            <h1 data-aos="fade-up" >Hello, My name is Khusyasy</h1>
            <h2 data-aos="fade-up" >Computer Science Student</h2>
        </div>
    </div>
    <script src="./js/index.js"></script>
</body>
</html>
