<div class="flex-center">
	<div class="project-image-container" data-aos="zoom-in">
		<img class="project-image" src="{ img }" alt="Project" width="auto" height="360px">
	</div>
	<div class="project-details" data-aos="fade-right" data-aos-delay="200">
		<h1>{ title }</h1>
		<p>
			{ desc }
		</p>
		<div class="btn-container">
		<a class="btn btn-primary" href="{ file }">Learn More</a>
		<div class="bntn-container">
			<a class="btn btn-secondary" href="{ live }">See Live</a>
			<a class="btn btn-other" href="{ repo }">Source Code</a>
		</div>
		</div>
	</div>
</div>
